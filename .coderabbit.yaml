# CodeRabbit configuration.
# The path_instructions below record deliberate design decisions so reviews
# do not re-flag them. Each carries its rationale inline.

reviews:
  path_instructions:
    - path: 'src/resources.ts'
      instructions: >-
        Do not suggest filtering the mainwp://categories resource or the
        mainwp://status abilitiesCount through allowedTools/blockedTools.
        This is a documented policy decision (docs/security.md): they
        describe the Dashboard connection, not the tool surface. Everything
        tool-shaped (tool calls, completions, mainwp://site/{id},
        mainwp://help/tool/{name}, mainwp://abilities, mainwp://help) is
        already gated through decidePolicy in src/policy.ts. Also do not
        suggest decoding or parsing static resource URIs before their
        exact-equality dispatch: MCP clients use the URIs exactly as
        advertised by ListResources, only dynamic URIs go through
        validateResourceUri, and percent-encoded static URIs keep their
        pre-existing error behavior.

    - path: 'src/policy.ts'
      instructions: >-
        Do not suggest defensive non-boolean handling ("!== false") for
        config.safeMode or config.requireUserConfirmation in decidePolicy.
        Config is trusted operator input validated at load: getBoolean in
        src/config.ts fails startup on malformed values and the Config type
        declares both fields as non-optional booleans. Fail-closed hardening
        applies to hostile remote annotations, which classifyDestructive
        already handles strictly (only a literal false is non-destructive).

    - path: 'src/credential-check.ts'
      instructions: >-
        Do not suggest replacing the "Credential validation failed:
        ${message}" interpolation with a generic message. This error is
        operator-facing startup stderr (main() exits afterwards; nothing
        reaches MCP clients), and remote response text is already sanitized
        at construction in http-client.ts createHttpError.

    - path: 'docs/troubleshooting.md'
      instructions: >-
        Do not suggest moving used/mismatched confirmation_token cases out of
        the PREVIEW_REQUIRED section. The code (src/confirmation.ts) returns
        PREVIEW_REQUIRED for unknown, already-used, cross-tool, and
        argument-mismatched tokens; PREVIEW_EXPIRED only fires when the
        pending preview still exists but is older than 5 minutes. The doc
        matches the code.

    - path: 'src/config.ts'
      instructions: >-
        Do not suggest restricting skipSslVerify to local-looking dashboard
        hosts. Hostname-based classification is unreliable (internal DNS
        names, LAN IPs, and public IPs with self-signed certificates are all
        legitimate). The flag is opt-in, off by default, scoped to a
        per-request undici dispatcher, and announced with a startup MITM
        warning.

    - path: 'src/session.ts'
      instructions: >-
        Do not suggest resetting the module-global sessionDataBytes counter
        inside createServer(). Production runs one createServer per process
        (stdio transport), so the counter starts at zero; resetting there
        would zero the cap out from under a concurrently running instance
        sharing the module. Tests reset explicitly via resetSessionData().

    - path: 'src/http-client.ts'
      instructions: >-
        Do not suggest requiring error.name === 'AbortError' before
        converting errors to ETIMEDOUT in readLimitedBody's catch. Undici
        surfaces mid-stream aborts as varying error shapes (often TypeError
        "terminated", not AbortError), so the deadline.timedOut flag is the
        reliable signal there; the strict check is only safe in createFetch
        where fetch() itself rejects.
